<svg width="100%" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ServiceNow Agent Orchestration Pipeline</title>
  <desc>Flowchart showing the Orchestrator commanding BA, Architect, Developer and Tester agents in sequence, with a fix loop back to Architect or Developer on failure.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #333; }
      .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .ts { font-size: 12px; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.2; fill: none; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #3C3489; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal text { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue text { fill: #0C447C; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green text { fill: #27500A; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber text { fill: #633806; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral text { fill: #711B0A; }
    </style>
  </defs>

  <!-- Orchestrator -->
  <g class="c-purple">
    <rect x="215" y="20" width="250" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Orchestrator</text>
    <text class="ts" x="340" y="62" text-anchor="middle" dominant-baseline="central">Commands the full pipeline</text>
  </g>

  <line x1="340" y1="76" x2="340" y2="116" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="350" y="100" dominant-baseline="central">requirements.md</text>

  <!-- BA Agent -->
  <g class="c-teal">
    <rect x="215" y="116" width="250" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">BA Agent</text>
    <text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">Requirements → rm_stories</text>
  </g>

  <line x1="340" y1="172" x2="340" y2="212" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="350" y="196" dominant-baseline="central">stories.md</text>

  <!-- Architect -->
  <g class="c-blue">
    <rect x="215" y="212" width="250" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="234" text-anchor="middle" dominant-baseline="central">Architect</text>
    <text class="ts" x="340" y="254" text-anchor="middle" dominant-baseline="central">Design + dev instructions + test plan</text>
  </g>

  <line x1="340" y1="268" x2="340" y2="308" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="350" y="292" dominant-baseline="central">architecture.md</text>

  <!-- Developer -->
  <g class="c-green">
    <rect x="215" y="308" width="250" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="330" text-anchor="middle" dominant-baseline="central">Developer</text>
    <text class="ts" x="340" y="350" text-anchor="middle" dominant-baseline="central">Build in ServiceNow via MCP</text>
  </g>

  <line x1="340" y1="364" x2="340" y2="404" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="350" y="388" dominant-baseline="central">dev-log.md</text>

  <!-- Tester -->
  <g class="c-amber">
    <rect x="215" y="404" width="250" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="426" text-anchor="middle" dominant-baseline="central">Tester</text>
    <text class="ts" x="340" y="446" text-anchor="middle" dominant-baseline="central">Validate against requirements</text>
  </g>

  <line x1="340" y1="460" x2="340" y2="500" class="arr" marker-end="url(#arrow)"/>

  <!-- Gate -->
  <polygon points="340,500 380,530 340,560 300,530" fill="none" stroke="#888" stroke-width="1"/>
  <text class="th" x="340" y="530" text-anchor="middle" dominant-baseline="central">Pass?</text>

  <line x1="340" y1="560" x2="340" y2="600" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="350" y="582" dominant-baseline="central">Yes</text>

  <!-- Deploy -->
  <g class="c-teal">
    <rect x="215" y="600" width="250" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="622" text-anchor="middle" dominant-baseline="central">Ready to deploy</text>
  </g>

  <text class="ts" x="386" y="524" dominant-baseline="central">No</text>
  <path d="M380 530 L580 530 L580 360" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Fix loop box -->
  <g class="c-coral">
    <rect x="490" y="300" width="170" height="66" rx="8" stroke-width="0.5"/>
    <text class="th" x="575" y="322" text-anchor="middle" dominant-baseline="central">Fix loop</text>
    <text class="ts" x="575" y="336" text-anchor="middle" dominant-baseline="central">Logic flaw → Architect</text>
    <text class="ts" x="575" y="352" text-anchor="middle" dominant-baseline="central">Impl bug → Developer</text>
  </g>

  <!-- Logic flaw → Architect -->
  <path d="M490 316 L440 316 L440 240 L465 240" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <!-- Impl bug → Developer: routes below Fix box to avoid overlap -->
  <path d="M575 356 L575 390 L440 390 L440 336 L465 336" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="575" y="376" text-anchor="middle">Max 5 iterations</text>

  <!-- Tool priority -->
  <rect x="20" y="308" width="170" height="76" rx="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="th" x="105" y="332" text-anchor="middle" dominant-baseline="central">Tool priority</text>
  <text class="ts" x="105" y="352" text-anchor="middle" dominant-baseline="central">1. ServiceNow MCP</text>
  <text class="ts" x="105" y="368" text-anchor="middle" dominant-baseline="central">2. REST API (fallback)</text>
  <line x1="190" y1="336" x2="215" y2="336" class="arr" marker-end="url(#arrow)"/>

  <!-- Workspace -->
  <rect x="20" y="600" width="170" height="56" rx="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="th" x="105" y="622" text-anchor="middle" dominant-baseline="central">Workspace</text>
  <text class="ts" x="105" y="642" text-anchor="middle" dominant-baseline="central">~/.claude/workspace/</text>
  <text class="ts" x="105" y="658" text-anchor="middle" dominant-baseline="central">[project-slug]/</text>
</svg>
